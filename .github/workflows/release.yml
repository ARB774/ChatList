name: Build And Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller pillow

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows executable
        shell: pwsh
        run: python -m PyInstaller --noconfirm --distpath dist_new --workpath build_new ChatListApp.spec

      - name: Build Windows installer
        shell: pwsh
        run: python build_installer.py

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "installer=release/ChatListApp_Setup_$version.exe"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "portable=dist_new/ChatListApp.exe"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.installer }}
            ${{ steps.meta.outputs.portable }}

